name: Update Scoreboards

on:
  push:
    branches:
      - main
    paths:
      - 'challenge-*/submissions/**'
  workflow_dispatch:
    inputs:
      challenge_name:
        description: 'Specific challenge to update (e.g. challenge-3-pytorch-neural-network). Leave empty to detect from the last commit.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-scoreboards
  cancel-in-progress: false

jobs:
  update-scoreboards:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow itself (avoids an infinite push loop).
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Detect changed challenges
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.challenge_name }}" ]; then
            CHANGED="${{ github.event.inputs.challenge_name }}"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^challenge-[0-9]+-[^/]+/submissions/' | cut -d'/' -f1 | sort -u || true)
          fi

          if [ -z "$CHANGED" ]; then
            echo "No challenge submissions were modified"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Challenges with submission changes: $CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "challenges=$(echo "$CHANGED" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate scoreboards
        if: steps.detect.outputs.has_changes == 'true'
        run: uv run python scripts/update_scoreboards.py ${{ steps.detect.outputs.challenges }}

      - name: Commit and push
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add challenge-*/SCOREBOARD.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update scoreboards for: ${{ steps.detect.outputs.challenges }}"

          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            git fetch origin main
            if ! git diff --quiet HEAD origin/main; then
              git rebase origin/main || { git rebase --abort; git merge origin/main -m "Merge remote changes before scoreboard update"; }
            fi
            if git push origin main; then
              echo "Successfully pushed changes"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
            sleep $((RETRY_COUNT * 2))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          echo "## Scoreboards Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Challenges: ${{ steps.detect.outputs.challenges }}" >> "$GITHUB_STEP_SUMMARY"
