name: Auto Merge Ready PRs

permissions:
  contents: write
  pull-requests: write
  checks: read

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    outputs:
      merged_count: ${{ steps.merge-prs.outputs.merged_count }}
      changed_challenges: ${{ steps.merge-prs.outputs.changed_challenges }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-merge eligible PRs
        id: merge-prs
        uses: actions/github-script@v7
        with:
          script: |
            // How long a PR must sit with a green pr-status check before it is
            // eligible for auto-merge. Tune this to taste.
            const WAIT_MS = 2 * 24 * 60 * 60 * 1000; // 2 days
            const MAX_MERGES_PER_RUN = 10;
            const now = new Date();
            let mergeCount = 0;
            const changedChallenges = new Set();

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });

            for (const pr of prs) {
              if (mergeCount >= MAX_MERGES_PER_RUN) {
                console.log(`Reached maximum of ${MAX_MERGES_PER_RUN} merges per run. Stopping.`);
                break;
              }

              const labels = pr.labels.map(l => l.name);
              if (labels.includes('do-not-merge')) {
                console.log(`PR #${pr.number}: Skipping - has 'do-not-merge' label`);
                continue;
              }

              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });

              const prStatusCheck = checks.check_runs.find(c => c.name === 'pr-status');
              if (!prStatusCheck) {
                console.log(`PR #${pr.number}: Skipping - no pr-status check found`);
                continue;
              }
              if (prStatusCheck.conclusion !== 'success') {
                console.log(`PR #${pr.number}: Skipping - pr-status check is '${prStatusCheck.conclusion}'`);
                continue;
              }

              const checkCompletedAt = new Date(prStatusCheck.completed_at);
              const timeSinceCheck = now - checkCompletedAt;
              if (timeSinceCheck < WAIT_MS) {
                const hoursRemaining = Math.ceil((WAIT_MS - timeSinceCheck) / (60 * 60 * 1000));
                console.log(`PR #${pr.number}: Skipping - needs ${hoursRemaining} more hour(s) before auto-merge`);
                continue;
              }

              let prDetails = (await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              })).data;

              if (prDetails.mergeable_state === 'unknown' || prDetails.mergeable === null) {
                console.log(`PR #${pr.number}: Waiting for GitHub to compute merge status...`);
                await new Promise(resolve => setTimeout(resolve, 5000));
                prDetails = (await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                })).data;
              }

              if (prDetails.mergeable_state !== 'clean' && prDetails.mergeable_state !== 'unstable') {
                console.log(`PR #${pr.number}: Skipping - mergeable_state is '${prDetails.mergeable_state}'`);
                continue;
              }

              console.log(`PR #${pr.number}: Merging - pr-status passed and wait period elapsed`);

              try {
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });

                for (const file of files) {
                  const match = file.filename.match(/^(challenge-\d+-[^/]+)\/submissions\//);
                  if (match) {
                    changedChallenges.add(match[1]);
                  }
                }

                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: `Auto-merged after passing checks and the wait period.\n\nPR: #${pr.number}\nAuthor: @${pr.user.login}`
                });

                console.log(`PR #${pr.number}: Successfully merged!`);
                mergeCount++;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `Auto-merged! Thank you for your submission, @${pr.user.login}. The scoreboard will update shortly.`
                });
              } catch (error) {
                console.log(`PR #${pr.number}: Failed to merge`);
                console.log(`  Error message: ${error.message}`);
                console.log(`  mergeable_state: ${prDetails.mergeable_state}`);
              }
            }

            console.log(`\nAuto-merge complete. Merged ${mergeCount} PR(s) this run.`);
            console.log(`Challenges to update: ${Array.from(changedChallenges).join(', ') || 'none'}`);

            core.setOutput('merged_count', mergeCount);
            core.setOutput('changed_challenges', Array.from(changedChallenges).join(' '));

  # Merging via the default GITHUB_TOKEN does not trigger update-scoreboards.yml's
  # push event, so regenerate scoreboards inline right after merging.
  update-scoreboards:
    needs: auto-merge
    if: needs.auto-merge.outputs.merged_count > 0 && needs.auto-merge.outputs.changed_challenges != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Regenerate scoreboards
        run: uv run python scripts/update_scoreboards.py ${{ needs.auto-merge.outputs.changed_challenges }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add challenge-*/SCOREBOARD.md

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update scoreboards after auto-merge

          Challenges: ${{ needs.auto-merge.outputs.changed_challenges }}"

          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            git fetch origin main
            if ! git diff --quiet HEAD origin/main; then
              git rebase origin/main || { git rebase --abort; git merge origin/main -m "Merge remote changes before scoreboard update"; }
            fi
            if git push origin main; then
              echo "Successfully pushed changes"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
            sleep $((RETRY_COUNT * 2))
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
